name: resolve-series
# Utility: resolve a cricapi series id by search term. Prints raw response + tries the
# failover key. Series list only (key masked in logs).
on:
  workflow_dispatch:
    inputs:
      search:
        description: "series search term (e.g. a team name)"
        required: true
        default: "New Zealand"

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: cricapi series search (primary + failover key)
        env:
          K1: ${{ secrets.CRICKET_API_KEY }}
          K2: ${{ secrets.CRICKET_API_KEY2 }}
          Q: ${{ github.event.inputs.search }}
        run: |
          for K in "$K1" "$K2"; do
            echo "===== key=${K:0:4}... search=$Q ====="
            body=$(curl -s -w "\n__HTTP__%{http_code}" "https://api.cricapi.com/v1/series?apikey=$K&search=$Q&offset=0")
            code=$(printf '%s' "$body" | sed -n 's/.*__HTTP__//p')
            json=$(printf '%s' "$body" | sed 's/__HTTP__.*//')
            echo "HTTP=$code  bytes=${#json}"
            echo "RAW(first 300): $(printf '%s' "$json" | head -c 300)"
            printf '%s' "$json" | python3 -c "import sys,json;
try:
    d=json.load(sys.stdin); rows=d.get('data',[])
    print('STATUS', d.get('status'), d.get('reason',''))
    [print(s.get('id'),'|',s.get('name'),'|',s.get('startDate'),'..',s.get('endDate'),'| matches=',s.get('matches')) for s in rows if 'new zealand' in (s.get('name','').lower()) or 'west indies' in (s.get('name','').lower())]
except Exception as e:
    print('parse-error:', e)"
            echo
          done
