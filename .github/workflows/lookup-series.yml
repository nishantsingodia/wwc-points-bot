name: lookup-series
# One-off helper: uses the cricapi key (a repo secret) to resolve a series id and prints
# ONLY the matching series (id | name | dates) — the key itself is masked by GitHub in logs.
# Safe to delete after use.
on:
  workflow_dispatch:
    inputs:
      search:
        description: "series search term"
        required: true
        default: "Ireland"

jobs:
  lookup:
    runs-on: ubuntu-latest
    steps:
      - name: cricapi series search
        run: |
          for q in "Ireland" "West Indies"; do
            echo "===== search=$q ====="
            curl -s "https://api.cricapi.com/v1/series?apikey=${{ secrets.CRICKET_API_KEY }}&search=$q" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); rows=[s for s in d.get('data',[]) if any(k in (s.get('name','').lower()) for k in ('ireland','west indies'))]; print('\n'.join(f\"{s.get('id')} | {s.get('name')} | {s.get('startDate')}..{s.get('endDate')} | matches={s.get('matches')}\" for s in rows)) if rows else print('(no ireland/wi series in this search)')"
          done
