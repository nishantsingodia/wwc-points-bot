name: Tour Sync (auto-ingest)

# Discovers cricket tours starting in the next few days (cricapi, watchlist-filtered),
# generates the draft-app + bot artifacts, VALIDATES them, then commits both repos and
# triggers a Vercel prod deploy — so a new tour appears in wwc-draft and gets scored by
# the bot with no manual code edits.
#
# REQUIRED SECRETS (set in this repo's Settings -> Secrets -> Actions):
#   CRICKET_API_KEY      - already used by the points workflow (reuse)
#   GSHEET_ID            - already used by the points workflow (reuse; builds the tab gviz URL)
#   DRAFT_REPO_PAT       - a PAT (repo scope) that can push to nishantsingodia/wwc-draft   [NEW]
#   VERCEL_TOKEN         - a Vercel access token (Account Settings -> Tokens).             [NEW]
#                          wwc-draft is NOT git-connected in Vercel, so we deploy via the
#                          Vercel CLI + token (org/project ids are baked in below, non-secret).
#
# SAFETY: run once via "Run workflow" (workflow_dispatch) and review the two commits +
# the deploy before trusting the daily cron. The validation gate (tsc + JSON parse) fails
# the job BEFORE any commit/deploy if the generated data is malformed.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: discover + print only (no commit, no deploy)"
        type: boolean
        default: true
  schedule:
    # 00:10 UTC — right after cricapi's daily quota reset (00:00 UTC), so tour-sync gets
    # fresh hits BEFORE the 2-hourly points bot drains both keys. (It ran at 06:00 before,
    # by which point the live points scoring had maxed the free-tier 100/day cap on both
    # keys, so discovery silently found nothing for 6 days.)
    - cron: "10 0 * * *"

permissions:
  contents: write

concurrency:
  group: tour-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bot
        uses: actions/checkout@v4

      - name: Checkout draft app
        uses: actions/checkout@v4
        with:
          repository: nishantsingodia/wwc-draft
          token: ${{ secrets.DRAFT_REPO_PAT }}
          path: wwc-draft

      # Auction app = the source of curated, identity-anchored LEAGUE squads (cricapi carries
      # none). We read its seed files; no build, just the .ts squad exports.
      - name: Checkout auction app (squad seeds)
        uses: actions/checkout@v4
        with:
          repository: nishantsingodia/cricket-auction-helper
          token: ${{ secrets.DRAFT_REPO_PAT }}
          path: cricket-auction-helper

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"   # TypeScript type-stripping for the squad-seed extractor

      # Dump the auction seed squads to JSON (node strips the TS types). Non-fatal: if it
      # fails, tour_sync just falls back to cricapi squads for any discovered tour.
      - name: Extract auction league squads
        run: |
          node extract_auction_squads.mjs "$GITHUB_WORKSPACE/cricket-auction-helper" \
            > auction_squads.json || echo "[]" > auction_squads.json
          node -e "console.log('auction seeds:', JSON.parse(require('fs').readFileSync('auction_squads.json')).length)"

      # Generate + write artifacts into both working trees (stdlib only, no pip).
      - name: Generate tours
        id: gen
        env:
          # Per Nishant: tour-sync uses the NORMAL shared cricapi pool (no dedicated key). Discovery
          # is only ~15-25 hits/day and the TOUR CONTROL gate keeps the points bot from draining the
          # pool on unapproved tours, so the shared budget has room. (_keys() falls back to the
          # shared keys when TOUR_SYNC_API_KEY is unset — we deliberately don't pass it.)
          CRICKET_API_KEY: ${{ secrets.CRICKET_API_KEY }}
          CRICKET_API_KEY2: ${{ secrets.CRICKET_API_KEY2 }}
          DRAFT_REPO: ${{ github.workspace }}/wwc-draft
          SYNC_SHEET_ID: ${{ secrets.GSHEET_ID }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          # Needed to READ Column A of the TOUR STATUS tab (the "type a tour name to add it" input).
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -o pipefail   # so a crashed generator fails the step (tee was masking it)
          pip install -r requirements.txt   # gspread — needed to READ Column A of the TOUR STATUS tab
          # KEYLESS, Column-A-driven: read the tour names Nishant typed in the TOUR STATUS tab and
          # ESPN-add any new ones (name → league id → fixtures → full squads). No cricapi.
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN — read Column A + resolve on ESPN, nothing written/committed/deployed"
            python3 tour_sync.py --dry-run --from-status-sheet | tee /tmp/sync.out
          else
            python3 tour_sync.py --apply --from-status-sheet | tee /tmp/sync.out
          fi
          echo "applied=$(grep -oP '(?<=::applied::).*' /tmp/sync.out || echo '[]')" >> "$GITHUB_OUTPUT"

      # Finish what tour_sync alone cannot: anchor the new squads to pids (build_registry) and
      # sync them into the draft roster (backfill_draft_pids), write the "TOUR INGEST REVIEW" tab,
      # then RUN THE VERIFY GATE. The gate fails this job — BEFORE any commit/deploy — if a tour
      # would ship with an unresolved espn_series or blank pids (the two silent failures behind the
      # LPL/Hundred bugs). This is how "add tour -> points -> draft" is *guaranteed* automatic, not
      # merely hoped: a half-wired tour screams instead of shipping green.
      - name: Anchor identity + verify gate (Tour Ingest Review)
        if: github.event.inputs.dry_run != 'true' && steps.gen.outputs.applied != '[]'
        env:
          AUCTION_DB: ${{ github.workspace }}/cricket-auction-helper/db/cricket-auction.db
          AUCTION_SRC: ${{ github.workspace }}/cricket-auction-helper/src/lib/squads
          DRAFT_RAW: ${{ github.workspace }}/wwc-draft/data/players-raw.json
          DRAFT_LIB: ${{ github.workspace }}/wwc-draft/lib
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          # Pass the applied-tours JSON through the ENV, never shell-interpolated: tour names carry
          # apostrophes ("The Hundred Men's Competition 2026") that break a single-quoted shell arg
          # -> finalize would crash and the whole ingest abort before commit/deploy.
          APPLIED: ${{ steps.gen.outputs.applied }}
        run: |
          pip install -r requirements.txt
          python3 tour_sync_finalize.py "$APPLIED"

      # E2E per-tour visibility → writes the "TOUR STATUS" GSheet tab (Tour/Squads/Draft/Sheet +
      # the sheet↔draft team-code & pid mapping health). Always runs (even with nothing applied) so
      # the dashboard reflects current reality. Read-only: no cricapi, never mutates a repo.
      - name: Tour status dashboard
        # Runs on dry-runs too, so the TOUR STATUS tab is CREATED/refreshed even before a real
        # apply — that's the tab Nishant types new tour names into (Column A). Read-only.
        env:
          DRAFT_REPO: ${{ github.workspace }}/wwc-draft
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          pip install -r requirements.txt
          python3 tour_status.py

      # VALIDATION GATE — must pass before anything is committed or deployed.
      - name: Validate draft app
        run: |
          cd wwc-draft
          node -e "['data/matches.json','data/players-raw.json','data/team-codes.json','data/points-tabs.json','data/espn-series.json'].forEach(f=>JSON.parse(require('fs').readFileSync(f)))"
          npm ci
          npx tsc --noEmit
          npm run check:tours   # loud gate: unknown team codes / a gender with no ESPN series (live points won't resolve)

      - name: Validate bot JSON
        run: |
          python3 -c "import json,glob; [json.load(open(f)) for f in ['tours.json','toss_windows.json']+glob.glob('*_squads.json')]"

      # Commit + push both repos (only if the generator changed anything).
      - name: Commit + push
        if: steps.gen.outputs.applied != '[]'
        env:
          APPLIED: ${{ steps.gen.outputs.applied }}   # via env: JSON quotes/apostrophes never hit the shell
        run: |
          MSG="Auto-ingest tours: $APPLIED"
          git config user.name "tour-sync-bot"
          git config user.email "noreply@anthropic.com"
          git diff --quiet || { git add tours.json toss_windows.json *_squads.json registry/players.json registry/tours; git commit -m "$MSG"; git push; }
          cd wwc-draft
          git config user.name "tour-sync-bot"
          git config user.email "noreply@anthropic.com"
          git diff --quiet || { git add data/matches.json data/players-raw.json data/team-codes.json data/points-tabs.json data/espn-series.json lib/registry-players.json; git commit -m "$MSG"; git push; }

      # Deploy draft to Vercel prod via CLI (project isn't git-connected, so no deploy hook).
      # org/project ids are non-secret identifiers; only VERCEL_TOKEN is a secret.
      - name: Deploy draft to Vercel prod
        if: steps.gen.outputs.applied != '[]'
        working-directory: wwc-draft
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_OEUjhwwdwT7vvnaNpsKhsYsg
          VERCEL_PROJECT_ID: prj_8fyGu6fjKbWma87J6gSgGnG2NWCb
        run: |
          npm i --global vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      # Optional: ping your Telegram-brain bot with what was ingested (safety net for
      # the no-approval flow). Uncomment + set TELEGRAM_* secrets to enable.
      # - name: Notify
      #   if: steps.gen.outputs.applied != '[]'
      #   run: |
      #     curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
      #       -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
      #       -d text="tour-sync ingested: ${{ steps.gen.outputs.applied }}"
