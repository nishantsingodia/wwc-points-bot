name: WWC T20 Points

# Triggered from the Google Sheet button (workflow_dispatch) AND on a schedule
# as a safety net so finished matches + newly-posted cricsheet dots appear
# without anyone having to click.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours (UTC) — halved from 2h to save cricapi budget; the
                            # 5-min ESPN tick + on-demand button cover freshness between runs

# Push approved recon overrides back to the repo (registry/recon_overrides.json).
permissions:
  contents: write

# Serialize runs (scheduled + manual) so two can't race on the recon_overrides.json push.
concurrency:
  group: wwc-points-sheet
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      # Persist cricapi scorecards between runs (completed matches are immutable),
      # so we don't re-fetch them every run and blow the 100 hits/day free limit.
      - name: Cache cricapi scorecards
        uses: actions/cache@v4
        with:
          path: api_cache
          key: wc-apicache-${{ github.run_id }}
          restore-keys: wc-apicache-

      # Cache the extracted cricsheet dir so the light runs (on-demand + live-lineup)
      # can RESTORE it and classify completed matches identically — without it, a
      # cricsheet-less run downgrades cricsheet-resolved matches (unresolved L1 gap)
      # from COMPLETED back to LIVE. This full run refreshes + re-saves it every 2h.
      - name: Cache cricsheet (shared with light runs)
        uses: actions/cache@v4
        with:
          path: cricsheet
          key: wc-cricsheet-${{ github.run_id }}
          restore-keys: wc-cricsheet-

      - name: Download cricsheet ball-by-ball (gold source - exact dots)
        continue-on-error: true   # non-fatal: if cricsheet is slow/down, fall back to cricapi
        run: |
          mkdir -p cricsheet
          # International T20Is (men's & women's) — covers WWC + bilateral T20I tours.
          curl -fsSL --retry 3 --retry-delay 5 --max-time 180 -o t20s.zip \
            https://cricsheet.org/downloads/t20s_json.zip
          unzip -o -q t20s.zip "*.json" -d cricsheet
          # Major League Cricket (USA franchise T20) — its own archive; the internationals
          # zip above does NOT contain league matches, so MLC needs this for its gold source.
          curl -fsSL --retry 3 --retry-delay 5 --max-time 180 -o mlc.zip \
            https://cricsheet.org/downloads/mlc_json.zip
          unzip -o -q mlc.zip "*.json" -d cricsheet
          # International ODIs (men's & women's) — for tours that set format: "ODI".
          # Same target dir; the tour's match filter + (date, teams) key select the format.
          curl -fsSL --retry 3 --retry-delay 5 --max-time 180 -o odis.zip \
            https://cricsheet.org/downloads/odis_json.zip
          unzip -o -q odis.zip "*.json" -d cricsheet
          # Lanka Premier League (Sri Lanka franchise T20) — its own archive; the internationals
          # zip above does NOT contain league matches, so LPL needs this for its gold source.
          curl -fsSL --retry 3 --retry-delay 5 --max-time 180 -o lpl.zip \
            https://cricsheet.org/downloads/lpl_json.zip
          unzip -o -q lpl.zip "*.json" -d cricsheet

      - name: Compute D11 points and write to Google Sheet(s)
        # Tours are defined in tours.json (each writes its own tab). See TOURS.md.
        env:
          CRICKET_API_KEY: ${{ secrets.CRICKET_API_KEY }}
          CRICKET_API_KEY2: ${{ secrets.CRICKET_API_KEY2 }}   # optional failover key (2nd cricapi account)
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CRICSHEET_DIR: cricsheet
          WC_CACHE_DIR: api_cache
        run: python wc_fps_to_csv.py

      - name: Persist sheet decisions (recon overrides + new players + anomaly acks) to git
        if: always()   # commit even if a later step fails — the approvals are already recorded
        run: |
          # The bot folds sheet decisions into these committed ledgers (recon picks ->
          # recon_overrides.json; "New"/auto-added players -> new_players.json; Identity Anomalies
          # Yes/No -> identity_splits.json; fully-completed tours -> frozen_tours.json, which stops
          # cricapi polling for finished tournaments); commit them so they survive the ephemeral
          # runner (and the answered sheet rows can be dropped without the answer re-surfacing).
          LEDGERS="registry/recon_overrides.json registry/new_players.json registry/identity_splits.json registry/frozen_tours.json"
          if [ -n "$(git status --porcelain $LEDGERS)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $LEDGERS
            git commit -m "chore: persist recon overrides + new players + anomaly acks [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "Persisted sheet decisions."
          else
            echo "Nothing to persist."
          fi

      - name: Surface unmatched player names (registry gaps to close)
        if: always()
        run: |
          # Non-fatal: prints any feed names the global registry didn't resolve
          # deterministically (fuzzy fallbacks + genuine non-squad players). Add the
          # real same-player ones to registry/manual_aliases.json and re-run build_registry.py.
          shopt -s nullglob
          logs=(registry/UNMATCHED_*.log)
          if [ ${#logs[@]} -gt 0 ]; then
            echo "::warning::Registry gaps — review and add aliases:"
            for f in "${logs[@]}"; do echo "--- $f ---"; cat "$f"; done
          else
            echo "No registry gaps — every feed name resolved deterministically."
          fi

      - name: Upload CSV artifacts (backup / debugging)
        uses: actions/upload-artifact@v4
        with:
          name: points-csv
          path: "*.csv"
